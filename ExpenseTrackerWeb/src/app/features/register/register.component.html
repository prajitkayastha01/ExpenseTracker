<div>
    <h2 class="mb-0">Create an Account</h2>
</div>
<div class="card-body">

    <div *ngIf="errorMessage" style="color: red;">
        {{ errorMessage }}
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">

        <div>
            <label class="form-label">Full Name: </label>
            <input type="text" class="form-control" formControlName="userName">
            <p class="text-danger" style="color: red;"
                *ngIf="registerForm.get('userName')?.invalid && registerForm.get('userName')?.touched">
                Name is required (min 3 characters).
            </p>
        </div>

        <div>
            <label class="form-label">Email: </label>
            <input type="email" class="form-control" formControlName="email">
            <p class="text-danger" style="color: red;" *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
                A valid email is required.
            </p>
        </div>

        <div>
            <label class="form-label">Phone Number: </label>
            <input type="text" class="form-control" formControlName="phoneNo">
            <p class="text-danger" style="color: red;" *ngIf="registerForm.get('phoneNo')?.invalid && registerForm.get('phoneNo')?.touched">
                A valid numeric phone number is required.
            </p>
        </div>

        <div>
            <label class="form-label">Password: </label>
            <input type="password" class="form-control" formControlName="password">
            <p class="text-danger" style="color: red;"
                *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
                Password must be at least 6 characters.
            </p>
        </div>

        <div>
            <label class="form-label">Confirm Password: </label>
            <input type="password" class="form-control" formControlName="confirmPassword">
            <p class="text-danger" style="color: red;"
                *ngIf="registerForm.get('confirmPassword')?.hasError('passwordMismatch') && registerForm.get('confirmPassword')?.touched">
                Passwords do not match.
            </p>
        </div>

        <button type="submit" class="btn btn-primary w-100" [disabled]="registerForm.invalid || isLoading">
            {{ isLoading ? 'Registering...' : 'Register' }}
        </button>

    </form>

    <div class="mt-3 text-center">
        <p>Already have an account? <a routerLink="/login">Login here</a></p>
    </div>
</div>
