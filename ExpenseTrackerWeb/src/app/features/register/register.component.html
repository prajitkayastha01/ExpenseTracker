<div class="auth-shell">
  <div class="auth-card">
    <h2>Create an Account</h2>
    <p class="auth-intro">Join Expense Tracker with a few simple details.</p>

    <div *ngIf="errorMessage" class="error-text">{{ errorMessage }}</div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="field">
        <label for="userName">Full Name</label>
        <input id="userName" type="text" formControlName="userName" placeholder="Enter your full name" />
        <p class="helper-text" *ngIf="registerForm.get('userName')?.invalid && registerForm.get('userName')?.touched">
          Name is required (min 3 characters).
        </p>
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" formControlName="email" placeholder="Enter your email" />
        <p class="helper-text" *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
          A valid email is required.
        </p>
      </div>

      <div class="field">
        <label for="phoneNo">Phone Number</label>
        <input id="phoneNo" type="text" formControlName="phoneNo" placeholder="Enter your phone number" />
        <p class="helper-text" *ngIf="registerForm.get('phoneNo')?.invalid && registerForm.get('phoneNo')?.touched">
          A valid numeric phone number is required.
        </p>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" formControlName="password" placeholder="Choose a password" />
        <p class="helper-text" *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
          Password must be at least 6 characters.
        </p>
      </div>

      <div class="field">
        <label for="confirmPassword">Confirm Password</label>
        <input id="confirmPassword" type="password" formControlName="confirmPassword" placeholder="Confirm your password" />
        <p class="helper-text" *ngIf="registerForm.get('confirmPassword')?.hasError('passwordMismatch') && registerForm.get('confirmPassword')?.touched">
          Passwords do not match.
        </p>
      </div>

      <button type="submit" [disabled]="registerForm.invalid || isLoading">
        {{ isLoading ? 'Registering...' : 'Register' }}
      </button>
    </form>

    <div class="auth-link">
      <p>Already have an account? <a routerLink="/login">Login here</a></p>
    </div>
  </div>
</div>
