<div class="auth-shell">
  <div class="auth-card">
    <h2>Tracker Login</h2>
    <p class="auth-intro">Sign in to continue managing your expenses.</p>

    <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="auth-form">
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" formControlName="email" placeholder="Enter your email" />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" formControlName="password" placeholder="Enter your password" />
      </div>

      <button type="submit" [disabled]="loginForm.invalid">Login</button>
    </form>

    <p *ngIf="errorMessage" class="error-text">{{ errorMessage }}</p>

    <div class="auth-link">
      <p>Don’t have an account? <a [routerLink]="['/register']">Register here</a></p>
    </div>
  </div>
</div>
